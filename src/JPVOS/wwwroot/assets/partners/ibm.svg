<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="IBM partner icon">
  <defs>
    <radialGradient id="g" cx="30%" cy="20%" r="85%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#7B30FF" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#FF2D8A" stop-opacity="0.92"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="52%" stop-color="#7B30FF"/>
      <stop offset="100%" stop-color="#FF2D8A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
