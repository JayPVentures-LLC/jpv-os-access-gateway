  <path d="M128 72 L176 166 H80 Z" fill="#05070B" opacity="0.72" stroke="#F5F7FA" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="128" cy="128" r="62" fill="#0A1020" opacity="0.78" stroke="#F5F7FA" stroke-opacity="0.12"/>
  <text x="128" y="139" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="42" font-weight="800" letter-spacing="1"
        fill="#F5F7FA">IBM</text>
  <text x="128" y="210" text-anchor="middle"
