# Fly.io configuration for JPVOS
# See https://fly.io/docs/reference/configuration/ for documentation

app = "jpvos"
primary_region = "iad"

[build]
  dockerfile = "src/JPVOS/Dockerfile"
  [build.args]

[env]
  ASPNETCORE_ENVIRONMENT = "Production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
